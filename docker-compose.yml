version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: recon_postgres
    environment:
      POSTGRES_DB: reconciliation_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - recon_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: recon_redis
    ports:
      - "6379:6379"
    volumes:
      - recon_redis_data:/data
    command: redis-server --appendonly yes

volumes:
  recon_postgres_data:
  recon_redis_data:
